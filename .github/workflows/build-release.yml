name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: Face-Local

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.meta.outputs.base_version }}
      package_version: ${{ steps.meta.outputs.package_version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: meta
        shell: bash
        run: |
          BASE_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          PACKAGE_VERSION="${BASE_VERSION}+build.${GITHUB_RUN_NUMBER}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          RELEASE_NAME="Face-Local main build ${BASE_VERSION} (${SHORT_SHA})"

          {
            echo "base_version=$BASE_VERSION"
            echo "package_version=$PACKAGE_VERSION"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libgl1 libglib2.0-0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build bundled app
        shell: bash
        run: python scripts/package_app.py --version "${{ needs.prepare.outputs.package_version }}"

      - name: Create release directory
        shell: bash
        run: mkdir -p release

      - name: Package macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          ditto -c -k --keepParent "dist/Face-Local.app" "release/Face-Local-macOS-app-${{ needs.prepare.outputs.package_version }}.zip"
          rm -rf release/dmg-root
          mkdir -p release/dmg-root
          cp -R "dist/Face-Local.app" "release/dmg-root/"
          ln -s /Applications "release/dmg-root/Applications"
          hdiutil create \
            -volname "Face-Local" \
            -srcfolder "release/dmg-root" \
            -ov \
            -format UDZO \
            "release/Face-Local-macOS-installer-${{ needs.prepare.outputs.package_version }}.dmg"

      - name: Package Windows installer
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ needs.prepare.outputs.package_version }}" "scripts\build_windows_installer.iss"
          Compress-Archive -Path "dist\Face-Local\*" -DestinationPath "release\Face-Local-windows-portable-${{ needs.prepare.outputs.package_version }}.zip" -Force

      - name: Package Linux installer
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          chmod +x scripts/build_linux_deb.sh
          scripts/build_linux_deb.sh "${{ needs.prepare.outputs.package_version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          path: release/*

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were produced." >&2
            exit 1
          fi

          notes=$'Automated cross-platform build from `main`.\n\n'
          notes+="- Commit: ${GITHUB_SHA}"$'\n'
          notes+="- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"$'\n'

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --notes "$notes" \
              --prerelease
          fi
